<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | تشافي</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: var(--bg-main); padding-top: 2rem; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--bg-card); padding: 2rem; border-radius: 16px; box-shadow: var(--shadow-md); }
        .tab-btn { margin-left: 1rem; margin-bottom: 2rem; }
        .hidden { display: none; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid var(--border-color); }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: var(--bg-card); padding: 3rem; border-radius: 16px; box-shadow: var(--shadow-md); text-align: center; }
    </style>
</head>
<body>

    <!-- Simple Password Auth Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-bottom: 2rem;">تسجيل الدخول للإدارة</h2>
            <input type="password" id="admin-pass" class="form-control" placeholder="كلمة المرور" style="margin-bottom: 1rem;">
            <button class="btn btn-primary" onclick="checkAdmin()">دخول</button>
        </div>
    </div>

    <div class="admin-container hidden" id="admin-panel">
        <h2>لوحة تحكم تشافي (CMS)</h2>
        <button class="btn btn-outline tab-btn" onclick="showTab('blogs')">المقالات</button>
        <button class="btn btn-outline tab-btn" onclick="showTab('testimonials')">آراء العملاء</button>
        <button class="btn btn-outline tab-btn" onclick="showTab('faqs')">الأسئلة الشائعة</button>

        <div id="blogs" class="tab-content">
            <h3>إدارة المقالات</h3>
            <div id="blogs-list">
                <div class="item-row">
                    <span>مقال تجريبي 1</span>
                    <div>
                        <button class="btn btn-outline" style="padding: 0.3rem 1rem;">تعديل</button>
                        <button class="btn btn-accent" style="padding: 0.3rem 1rem; background-color: #ff4c4c; border:none;">حذف</button>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary" style="margin-top: 1rem;">إضافة مقال جديد</button>
        </div>

        <div id="testimonials" class="tab-content hidden">
            <h3>إدارة الآراء</h3>
            <p>Placeholder for Testimonials CRUD...</p>
        </div>

        <div id="faqs" class="tab-content hidden">
            <h3>إدارة الأسئلة الشائعة</h3>
            <p>Placeholder for FAQs CRUD...</p>
        </div>
    </div>

    <script>
        function checkAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === 'admin123') { // Simple placeholder password
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                alert('كلمة المرور غير صحيحة');
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }
    </script>
</body>
</html>
